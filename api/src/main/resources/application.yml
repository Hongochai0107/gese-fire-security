server:
  port: ${APP_PORT:3001}
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:gese_fire_security}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5MB}
      max-request-size: 50MB

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USER:}
    password: ${MAIL_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:gese-jwt-secret-change-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  cors:
    origins: ${CORS_ORIGINS:http://localhost:5173}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  mail:
    from: ${MAIL_FROM:}
    admin: ${MAIL_ADMIN:}

springdoc:
  api-docs:
    path: /docs/api-docs
  swagger-ui:
    path: /docs
