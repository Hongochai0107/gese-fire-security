services:
  # ============ MySQL Database ============
  mysql:
    image: mysql:8.0
    container_name: gese-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: gese_root_2024
      MYSQL_DATABASE: gese_fire_security
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ Backend API (Spring Boot) ============
  api:
    container_name: gese-api
    build:
      context: .
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      APP_PORT: 3001
      CORS_ORIGINS: http://localhost,http://localhost:5174,http://localhost:5175
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USERNAME: root
      DB_PASSWORD: gese_root_2024
      DB_DATABASE: gese_fire_security
      JPA_DDL_AUTO: update
      SHOW_SQL: "false"
      JWT_SECRET: gese-jwt-secret-change-in-production-min-32-chars!!
      JWT_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_DAYS: 7
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 5MB
    volumes:
      - api_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  # ============ Frontend Marketing (React) ============
  frontend:
    container_name: gese-frontend
    build:
      context: ../gese-fire-security
    restart: unless-stopped
    ports:
      - "5174:80"
    depends_on:
      - api

  # ============ Admin Dashboard (React) ============
  admin:
    container_name: gese-admin
    build:
      context: ../gese-admin
    restart: unless-stopped
    ports:
      - "5175:80"
    depends_on:
      - api

volumes:
  mysql_data:
  api_uploads:
